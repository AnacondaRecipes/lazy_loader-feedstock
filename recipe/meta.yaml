{% set name = "lazy_loader" %}
{% set version = "0.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: 717f9179a0dbed357012ddad50a5ad3d5e4d9a0b8712680d4e687f5e6e6ed9b3

build:
  number: 0
  skip: true  # [py<37]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
  run:
    - python
    - importlib_metadata  # [py<38]
    - packaging

test:
  imports:
    - lazy_loader
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - pytest --pyargs lazy_loader

about:
  home: https://scientific-python.org/specs/spec-0001/
  summary: Easily load subpackages and functions on demand
  dev_url: https://github.com/scientific-python/lazy_loader
  license: BSD-3-Clause
  license_file: LICENSE.md
  license_family: BSD
  description: |
    'lazy-loader' makes it easy to load subpackages and functions on demand.
  doc_url: https://github.com/scientific-python/lazy_loader

extra:
  recipe-maintainers:
    - sugatoray
    - bmcfee
